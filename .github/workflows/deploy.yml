name: Deploy to GitHub Pages

on:
  # main 브랜치에 푸시될 때마다 배포
  push:
    branches: [main]
  # Actions 탭에서 수동 실행도 허용
  workflow_dispatch:

# GITHUB_TOKEN 권한: Pages 배포에 필요
permissions:
  contents: read
  pages: write
  id-token: write

# 동시 배포 1개로 제한 (진행 중인 런은 끊지 않음)
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build site (Astro + Pagefind)
        run: pnpm build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
